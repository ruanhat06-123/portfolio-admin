<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Testimonials Admin - Ruan Hattingh Portfolio</title>

  <link rel="stylesheet" href="CSS/styles.css" />
</head>

<body>

  <nav class="admin-navbar">
    <a href="index.html">Projects</a>
    <a href="testimonials.html" class="active-admin-link">Testimonials</a>
  </nav>

  <main class="admin-wrapper">

    <section class="admin-header">
      <h1>Testimonials Admin</h1>
      <p id="admin-status">Please log in to manage your testimonials.</p>
    </section>

    <!-- LOGIN SECTION -->
    <section id="login-section" class="admin-card">
      <h2>Admin Login</h2>

      <form id="login-form">
        <label for="admin-email">Email</label>
        <input
          type="email"
          id="admin-email"
          placeholder="Enter your admin email"
          required
        />

        <label for="admin-password">Password</label>
        <input
          type="password"
          id="admin-password"
          placeholder="Enter your password"
          required
        />

        <button type="submit">Log In</button>
      </form>
    </section>

    <!-- DASHBOARD SECTION -->
    <section id="dashboard-section" style="display: none;">

      <div class="top-actions">
        <button id="logout-button" type="button" class="secondary-button">
          Log Out
        </button>
      </div>

      <!-- ADD / EDIT TESTIMONIAL FORM -->
      <section class="admin-card">
        <h2 id="testimonial-form-title">Add New Testimonial</h2>

        <form id="testimonial-form">
          <input type="hidden" id="testimonial-id" />

          <label for="testimonial-author-name">Author</label>
          <input
            type="text"
            id="testimonial-author-name"
            placeholder="Example: John Smith"
            required
          />

          <label for="testimonial-author-role">Project Name</label>
          <input
            type="text"
            id="testimonial-author-role"
            placeholder="Example: Website Client"
          />

          <label for="testimonial-quote">Author Comments</label>
          <textarea
            id="testimonial-quote"
            rows="6"
            placeholder="Write the testimonial here..."
            required
          ></textarea>

          <label for="testimonial-display-order">Display Order</label>
          <input
            type="number"
            id="testimonial-display-order"
            min="1"
            value="1"
            required
          />

          <div class="checkbox-row">
            <label>
              <input type="checkbox" id="testimonial-published" checked />
              Published on portfolio
            </label>
          </div>

          <button type="submit">Save Testimonial</button>

          <button
            type="button"
            id="cancel-testimonial-edit-button"
            class="secondary-button"
            style="display: none;"
          >
            Cancel Edit
          </button>
        </form>
      </section>

      <!-- EXISTING TESTIMONIALS -->
      <section class="admin-card">
        <h2>Existing Testimonials</h2>
        <div id="testimonials-list">
          <p>Loading testimonials...</p>
        </div>
      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="JS/admin.js"></script>

</body>
</html>
